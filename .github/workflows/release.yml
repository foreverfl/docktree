name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/doctree .
          tar -C dist -czf dist/doctree_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz doctree
          rm dist/doctree
      - uses: actions/upload-artifact@v4
        with:
          name: doctree-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          retention-days: 1

  draft:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute next version and changelog
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last=$(gh release list --exclude-drafts --limit 100 --json tagName --jq '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [ -z "$last" ]; then
            ver=v0.0.1
            range=""
          else
            base=${last#v}
            IFS='.' read -r major minor patch <<< "$base"
            ver="v${major}.${minor}.$((patch+1))"
            range="${last}..HEAD"
          fi
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

          {
            echo "notes<<__EOF__"
            echo "## Changelog"
            echo
            git log $range --no-merges --pretty=format:'- %s (%h)'
            echo
            if [ -n "$last" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${last}...${ver}"
            fi
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
      - name: Recreate draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.ver }}
          NOTES: ${{ steps.ver.outputs.notes }}
          SHA: ${{ github.sha }}
        run: |
          # Drop any leftover drafts so we don't accumulate stale ones.
          gh release list --limit 50 --json tagName,isDraft \
            --jq '.[] | select(.isDraft) | .tagName' \
            | while read -r tag; do
                [ -n "$tag" ] && gh release delete "$tag" -y || true
              done
          gh release create "$VER" \
            --draft \
            --notes "$NOTES" \
            --target "$SHA" \
            --title "$VER" \
            dist/*.tar.gz
